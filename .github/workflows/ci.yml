name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Offline core tests only: the brief/Q&A logic and MCP wiring via FakeBackend.
      # No audio, no Whisper, no LLM download — the real end-to-end path is a gated
      # integration test verified locally (see README).
      - name: Install
        run: python -m pip install --upgrade pip mcp pytest
      - name: Run offline tests
        run: pytest -q
        env:
          PYTHONPATH: src
